# ---------------------------------------------------------------------------
# compose.yaml — Docker Compose file for the whole app stack.
#
# Two ways to bring the stack up, controlled by Compose PROFILES:
#
#   1. Infra only (default) — `docker compose up -d`
#      Starts:   postgres, redis
#      Use for:  running the Nest apps on your HOST with `yarn start:*`
#                (native watcher, native debugger, no image rebuilds).
#
#   2. Full stack           — `docker compose --profile app up --build`
#      Starts:   postgres, redis, users-service, api-gateway
#      Use for:  smoke-testing the production image path end-to-end,
#                or when you just want everything running.
#
# Profiles: services WITHOUT a `profiles:` key start on every `up`.
# Services WITH a profile only start when that profile is explicitly
# requested via `--profile <name>` (or COMPOSE_PROFILES env var).
#
# All services live on a Compose-managed user-defined bridge network
# and reach each other by SERVICE NAME (postgres, redis, users-service,
# api-gateway). Same pattern as Kubernetes' Service DNS.
# ---------------------------------------------------------------------------
name: docker-nestjs-learning

services:
  # ─────────────────────────────────────────────────────────────────────────
  # postgres — durable storage. Data lives in a named volume, not in the
  # container's writable layer, so `compose down` + `compose up` keeps data.
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # The postgres image REQUIRES these three specific var names.
      # We source them from our unified DB_* vars in .env so the same
      # names work in Compose, the app container, and local `yarn start`.
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-appdb}
    volumes:
      # Named volume: Docker manages the storage location; survives
      # `docker compose down`. Only `docker compose down -v` deletes it.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` ships with the postgres image. Exit 0 = accepting
      # connections. Compose polls this until healthy, then releases
      # anything with `depends_on: condition: service_healthy`.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      # Optional: publish postgres to the host so you can `psql` from
      # your laptop. Not needed for services on the compose network —
      # they reach postgres by name (`postgres:5432`).
      - "${DB_HOST_PORT:-5432}:5432"

  # ─────────────────────────────────────────────────────────────────────────
  # redis — key/value store. Consumed by api-gateway from Stage 6 onward
  # (used by the /readyz health check; wired for throttler/cache later).
  # No `ports:` here — other services on the compose network reach this
  # redis by name (`redis:6379`). Doesn't conflict with any local redis
  # you already run on 6379. If you want host access, add
  # `ports: ["6380:6379"]` (6380 to avoid the collision).
  # ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    ports:
      # Published so `yarn start:gateway` on the host can reach redis.
      # Defaults to 6379 (matches app default REDIS_URL). If you already
      # run a local redis on 6379, set REDIS_HOST_PORT=6380 in .env AND
      # REDIS_URL=redis://127.0.0.1:6380 so the app talks to the mapped port.
      # Inside the compose network, services still use redis:6379.
      - "${REDIS_HOST_PORT:-6379}:6379"

  # ─────────────────────────────────────────────────────────────────────────
  # users-service — internal TCP microservice, owns the users table.
  # ─────────────────────────────────────────────────────────────────────────
  users-service:
    # Opt-in: only starts with `docker compose --profile app up`.
    # Skipped on plain `docker compose up` so you can run the app on the host.
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/users-service/Dockerfile
    image: users-service:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      USERS_SERVICE_HOST: 0.0.0.0
      USERS_SERVICE_PORT: "4001"
      DB_HOST: postgres          # Compose service DNS — resolves to postgres container
      DB_PORT: "5432"            # Fixed: postgres inside its container always listens on 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-appdb}
    depends_on:
      postgres:
        # `service_healthy` waits until postgres's healthcheck is green.
        # Without this, users-service would try to connect while postgres
        # is still initializing and crash-loop.
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # api-gateway — public HTTP surface. Only externally-exposed service.
  # ─────────────────────────────────────────────────────────────────────────
  api-gateway:
    # Opt-in: only starts with `docker compose --profile app up`.
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    image: api-gateway:prod
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      USERS_SERVICE_HOST: users-service   # ← Compose service name; DNS-resolved
      USERS_SERVICE_PORT: "4001"
      REDIS_URL: redis://redis:6379       # ← same DNS pattern; used by /readyz + client
    depends_on:
      users-service:
        # NestClientProxy TCP-connects lazily so `service_started` would
        # be enough. `service_healthy` is stricter — waits until
        # users-service's baked-in HEALTHCHECK is green.
        condition: service_healthy
      redis:
        condition: service_healthy

# Named volumes managed by Docker. Persist across `docker compose down`.
# Wiped by `docker compose down -v` (destructive).
volumes:
  postgres_data:
  redis_data:
